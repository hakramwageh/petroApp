services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petroapp-app
    working_dir: /var/www/html
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: petroapp-db
    environment:
      POSTGRES_DB: petroapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petroapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
